<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>thehillbeyondthisone — terminal</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --amber: #ffb000;
      --amber-dim: #c47f00;
      --amber-faint: #3a2400;
      --bg: #080500;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--amber);
      font-family: 'Share Tech Mono', monospace;
      font-size: 14px;
      line-height: 1.7;
      overflow-x: hidden;
    }

    /* CRT scanlines */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0px,
        transparent 2px,
        rgba(0,0,0,0.22) 2px,
        rgba(0,0,0,0.22) 4px
      );
      pointer-events: none;
      z-index: 100;
    }

    /* Vignette */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.8) 100%);
      pointer-events: none;
      z-index: 101;
    }

    /* Screen flicker */
    @keyframes flicker {
      0%, 94%, 100% { opacity: 1; }
      95% { opacity: 0.88; }
      96% { opacity: 1; }
      97.5% { opacity: 0.92; }
    }

    .screen {
      animation: flicker 7s infinite;
      min-height: 100vh;
      padding: 2.5rem 3rem 5rem;
      max-width: 800px;
      margin: 0 auto;
    }

    .glow {
      text-shadow: 0 0 6px var(--amber), 0 0 14px rgba(255,176,0,0.45);
    }
    .dim { color: var(--amber-dim); }
    .faint { color: #6b4700; }

    /* Boot header box */
    .boot-header {
      border: 1px solid var(--amber-dim);
      padding: 1rem 1.5rem;
      margin-bottom: 2rem;
      opacity: 0;
      transition: opacity 0.5s ease;
      position: relative;
    }
    .boot-header.show { opacity: 1; }
    .boot-header .sys-label {
      font-size: 0.68rem;
      letter-spacing: 0.18em;
      color: var(--amber-dim);
      margin-bottom: 0.3rem;
    }
    .boot-header .title {
      font-size: 1.45rem;
      letter-spacing: 0.06em;
    }
    .boot-header .subtitle {
      font-size: 0.7rem;
      color: var(--amber-dim);
      margin-top: 0.2rem;
    }
    /* Corner brackets */
    .corner { position: absolute; width: 8px; height: 8px; border-color: var(--amber); border-style: solid; }
    .corner-tl { top: -1px; left: -1px; border-width: 2px 0 0 2px; }
    .corner-tr { top: -1px; right: -1px; border-width: 2px 2px 0 0; }
    .corner-bl { bottom: -1px; left: -1px; border-width: 0 0 2px 2px; }
    .corner-br { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }

    /* Terminal output */
    .terminal { display: flex; flex-direction: column; }

    .line {
      display: block;
      opacity: 0;
      white-space: pre-wrap;
      word-break: break-word;
      min-height: 1.7em;
    }
    .line.show { opacity: 1; }

    .prompt-line::before {
      content: '> ';
      color: var(--amber);
    }

    .output-line {
      padding-left: 1.5rem;
      color: var(--amber-dim);
    }
    .output-line.bright { color: var(--amber); }
    .output-line.faint-text { color: #6b4700; font-size: 0.8rem; }

    .spacer-line { height: 0.8rem; opacity: 1; }

    /* Links inside terminal */
    .term-link {
      color: var(--amber);
      text-decoration: underline;
      text-underline-offset: 3px;
      text-decoration-color: var(--amber-dim);
      transition: text-shadow 0.2s;
    }
    .term-link:hover {
      text-shadow: 0 0 8px var(--amber), 0 0 20px rgba(255,176,0,0.4);
      text-decoration-color: var(--amber);
    }

    .contact-link {
      display: block;
      padding-left: 1.5rem;
      color: var(--amber-dim);
      text-decoration: none;
      transition: color 0.15s, text-shadow 0.15s;
    }
    .contact-link:hover {
      color: var(--amber);
      text-shadow: 0 0 8px var(--amber);
    }
    .contact-link .ckey { color: var(--amber); }

    /* Blinking cursor */
    .blink-cursor {
      display: inline-block;
      width: 9px;
      height: 14px;
      background: var(--amber);
      vertical-align: middle;
      animation: blink 1.1s step-end infinite;
      box-shadow: 0 0 6px var(--amber);
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    @media (max-width: 600px) {
      .screen { padding: 1.5rem 1.2rem 4rem; }
      .boot-header .title { font-size: 1.05rem; }
      html, body { font-size: 13px; }
    }
  </style>
</head>
<body>
<div class="screen">
  <div class="boot-header" id="bootHeader">
    <div class="corner corner-tl"></div>
    <div class="corner corner-tr"></div>
    <div class="corner corner-bl"></div>
    <div class="corner corner-br"></div>
    <div class="sys-label">UNIFIED OPERATING SYSTEM // PERSONAL TERMINAL v2.6</div>
    <div class="title glow">THEHILLBEYONDTHISONE</div>
    <div class="subtitle">COPYRIGHT 2026 // AUTHORIZED ACCESS ONLY</div>
  </div>
  <div class="terminal" id="terminal"></div>
</div>

<script>
  const terminal = document.getElementById('terminal');
  const bootHeader = document.getElementById('bootHeader');

  const sleep = ms => new Promise(r => setTimeout(r, ms));

  function addEl(tag, classes, innerHTML) {
    const el = document.createElement(tag);
    el.className = classes;
    if (innerHTML !== undefined) el.innerHTML = innerHTML;
    terminal.appendChild(el);
    return el;
  }

  async function showLine(el, delay = 0) {
    if (delay) await sleep(delay);
    el.classList.add('show');
    window.scrollTo({ top: document.body.scrollHeight });
  }

  async function typeLine(text, speed = 55) {
    const el = addEl('div', 'line show prompt-line');
    for (let i = 0; i <= text.length; i++) {
      el.textContent = text.slice(0, i);
      await sleep(speed + (Math.random() * 18 - 9));
    }
    window.scrollTo({ top: document.body.scrollHeight });
    return el;
  }

  async function run() {
    await sleep(300);
    bootHeader.classList.add('show');
    await sleep(700);

    // Boot lines
    await typeLine('BOOT SEQUENCE INITIATED...', 38);
    await sleep(500);

    let l;
    l = addEl('div', 'line output-line', 'Checking memory banks.............&nbsp;<span class="bright">OK</span>');
    await showLine(l, 0);
    await sleep(250);
    l = addEl('div', 'line output-line', 'Loading user profile...............&nbsp;<span class="bright">OK</span>');
    await showLine(l);
    await sleep(250);
    l = addEl('div', 'line output-line', 'Mounting filesystem................&nbsp;<span class="bright">OK</span>');
    await showLine(l);
    await sleep(600);

    addEl('div', 'line spacer-line show');

    // whoami
    await typeLine('whoami', 65);
    await sleep(350);
    l = addEl('div', 'line output-line bright glow', 'thehillbeyondthisone');
    await showLine(l);
    l = addEl('div', 'line output-line', 'STATUS  :  🌴 on vacation');
    await showLine(l, 80);

    addEl('div', 'line spacer-line show');
    await sleep(200);

    // ls --projects
    await typeLine('ls --projects', 60);
    await sleep(400);

    l = addEl('div', 'line output-line bright', 'drwxr-xr-x &nbsp; <span class="glow">RubiKit</span> &nbsp;&nbsp;&nbsp;&nbsp;&nbsp; C# &nbsp;&nbsp; ★★★★☆ &nbsp; <a class="term-link" href="https://github.com/thehillbeyondthisone/RubiKit" target="_blank">[OPEN]</a>');
    await showLine(l, 100);
    l = addEl('div', 'line output-line faint-text', '&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; » OS-style modular framework for AOSharp. Built for extensibility.');
    await showLine(l, 80);

    await sleep(250);
    l = addEl('div', 'line output-line bright', 'drwxr-xr-x &nbsp; <span class="glow">WhatIfWe</span> &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; <a class="term-link" href="https://github.com/thehillbeyondthisone/WhatIfWe" target="_blank">[OPEN]</a>');
    await showLine(l, 80);
    l = addEl('div', 'line output-line faint-text', '&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; » A space for questions, experiments, and what comes after.');
    await showLine(l, 80);

    addEl('div', 'line spacer-line show');
    await sleep(200);

    // cat contact.cfg
    await typeLine('cat contact.cfg', 60);
    await sleep(400);

    const contacts = [
      { label: 'GITHUB  ', val: 'github.com/thehillbeyondthisone', href: 'https://github.com/thehillbeyondthisone' },
      { label: 'EMAIL   ', val: 'thehillbeyondthisone@gmail.com', href: 'mailto:thehillbeyondthisone@gmail.com' },
      { label: 'DISCORD ', val: 'YellowUmbrellaGroup#8756', href: null },
    ];

    for (const c of contacts) {
      if (c.href) {
        l = addEl('a', 'line contact-link show', `<span class="ckey">${c.label}</span>  ${c.val}`);
        l.href = c.href;
        if (c.href.startsWith('http')) l.target = '_blank';
      } else {
        l = addEl('div', 'line contact-link show', `<span class="ckey">${c.label}</span>  ${c.val}`);
      }
      terminal.appendChild(l);
      await sleep(120);
      window.scrollTo({ top: document.body.scrollHeight });
    }

    addEl('div', 'line spacer-line show');
    await sleep(200);

    // Final cursor
    const cur = addEl('div', 'line show', '<span class="dim">&gt; </span><span class="blink-cursor"></span>');
    window.scrollTo({ top: document.body.scrollHeight });
  }

  run();
</script>
</body>
</html>
